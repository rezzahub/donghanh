name = "donghanh-site"
main = "@astrojs/cloudflare/entrypoints/server"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

routes = [
  { pattern = "donghanh.dev", custom_domain = true },
  { pattern = "www.donghanh.dev", custom_domain = true },
]

[assets]
directory = "dist/client"
binding = "ASSETS"
